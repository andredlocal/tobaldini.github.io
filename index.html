<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dMore — Tax Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── dLocal-inspired palette ────────────────────────────────── */
:root{
  --navy:       #0A1628;
  --navy-light: #12223F;
  --navy-mid:   #1C3257;
  --green:      #00C48C;
  --green-dark: #00A375;
  --green-dim:  rgba(0,196,140,0.12);
  --white:      #FFFFFF;
  --off-white:  #F6F7F9;
  --gray-100:   #EEF0F4;
  --gray-200:   #DDE1EA;
  --gray-400:   #9BA5B7;
  --gray-600:   #5A6478;
  --gray-900:   #1A2236;
  --red:        #E24B4A;
  --red-dim:    rgba(226,75,74,0.10);
  --amber:      #F59E0B;
  --radius-sm:  6px;
  --radius:     10px;
  --radius-lg:  14px;
  --radius-xl:  20px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--off-white);
  color:var(--gray-900);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Page shell ─────────────────────────────────────────────── */
.shell{
  max-width:860px;
  margin:0 auto;
  padding:0 1.25rem 4rem;
}

/* ── Top nav bar ─────────────────────────────────────────────── */
.topbar{
  display:flex;
  align-items:center;
  gap:14px;
  padding:1.25rem 0 1.5rem;
  border-bottom:1px solid var(--gray-200);
  margin-bottom:2rem;
}
.logo-block{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo-icon{
  background:var(--navy);
  border-radius:var(--radius-sm);
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-name{
  font-size:15px;
  font-weight:700;
  color:var(--navy);
  letter-spacing:-0.01em;
}
.brand-name span{color:var(--green-dark);}
.topbar-divider{width:1px;height:22px;background:var(--gray-200);}
.topbar-title{font-size:14px;color:var(--gray-600);}

.sync-pill{
  margin-left:auto;
  display:flex;align-items:center;gap:7px;
  font-size:12px;color:var(--gray-600);
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:20px;
  padding:5px 12px 5px 9px;
  cursor:pointer;
  transition:border-color 0.15s,color 0.15s;
}
.sync-pill:hover{border-color:var(--green);color:var(--green-dark);}
.sync-pill:disabled{opacity:.5;cursor:default;}
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--gray-400);
  flex-shrink:0;transition:background .3s;
}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.spin-dot{background:var(--amber);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.spin{animation:rotate 1s linear infinite;}
@keyframes rotate{to{transform:rotate(360deg)}}

/* ── Error banner ─────────────────────────────────────────────── */
.err-banner{
  display:none;
  background:var(--red-dim);
  border:1px solid rgba(226,75,74,.25);
  color:#992f2e;
  font-size:13px;
  padding:10px 14px;
  border-radius:var(--radius);
  margin-bottom:1.5rem;
  line-height:1.55;
}

/* ── Two-column layout ────────────────────────────────────────── */
.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  align-items:start;
}
@media(max-width:680px){.layout{grid-template-columns:1fr;}}

/* ── Left panel: inputs ───────────────────────────────────────── */
.panel-inputs{
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:var(--radius-lg);
  overflow:hidden;
}
.panel-section{
  padding:1.25rem;
  border-bottom:1px solid var(--gray-100);
}
.panel-section:last-child{border-bottom:none;}

.section-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--gray-400);
  margin-bottom:.75rem;
}

/* Country select */
.country-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  padding:10px 12px;
  background:var(--off-white);
  border:1.5px solid var(--gray-200);
  border-radius:var(--radius);
  font-size:14px;
  font-family:inherit;
  color:var(--gray-900);
  cursor:pointer;
  transition:border-color .15s;
  text-align:left;
  line-height:1.4;
}
.country-btn:focus,
.country-btn:hover{border-color:var(--navy);outline:none;}
.country-meta{font-size:11px;color:var(--gray-400);margin-top:1px;}
.country-chevron{color:var(--gray-400);flex-shrink:0;}

/* Hidden real select, overlaid */
.select-wrap{position:relative;}
.select-wrap select{
  position:absolute;inset:0;
  width:100%;height:100%;
  opacity:0;cursor:pointer;
  font-size:16px;
}

/* Mode toggle */
.mode-tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  background:var(--off-white);
  border:1px solid var(--gray-200);
  border-radius:var(--radius);
  padding:3px;
}
.tab{
  padding:8px 6px;
  font-size:12px;
  font-weight:500;
  border:none;
  border-radius:7px;
  cursor:pointer;
  background:transparent;
  color:var(--gray-600);
  font-family:inherit;
  transition:all .15s;
  text-align:center;
  line-height:1.3;
}
.tab.active{
  background:var(--navy);
  color:var(--white);
}

/* Amount input */
.amount-wrap{
  position:relative;
}
.amount-currency{
  position:absolute;
  left:12px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--gray-400);
  pointer-events:none;
  font-weight:500;
}
.amount-input{
  width:100%;
  padding:11px 12px 11px 48px;
  font-size:22px;
  font-weight:600;
  color:var(--navy);
  background:var(--off-white);
  border:1.5px solid var(--gray-200);
  border-radius:var(--radius);
  font-family:inherit;
  outline:none;
  transition:border-color .15s;
  -moz-appearance:textfield;
}
.amount-input:focus{border-color:var(--navy);}
.amount-input::-webkit-inner-spin-button,
.amount-input::-webkit-outer-spin-button{-webkit-appearance:none;}

/* Fee inputs */
.fee-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:9px 0;
  border-bottom:1px solid var(--gray-100);
}
.fee-row:last-child{border-bottom:none;}
.fee-label{font-size:13px;color:var(--gray-600);}
.fee-input-wrap{display:flex;align-items:center;gap:4px;}
.fee-input{
  width:54px;
  padding:5px 8px;
  font-size:13px;
  font-weight:600;
  color:var(--navy);
  background:var(--off-white);
  border:1px solid var(--gray-200);
  border-radius:var(--radius-sm);
  font-family:inherit;
  outline:none;
  text-align:right;
  transition:border-color .15s;
  -moz-appearance:textfield;
}
.fee-input:focus{border-color:var(--navy);}
.fee-input::-webkit-inner-spin-button,
.fee-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.fee-pct{font-size:12px;color:var(--gray-400);}

/* ── Right panel: results ─────────────────────────────────────── */
.panel-results{display:flex;flex-direction:column;gap:14px;}

/* Hero card */
.hero-card{
  background:var(--navy);
  border-radius:var(--radius-lg);
  padding:1.5rem;
  color:var(--white);
}
.hero-label{
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-bottom:.5rem;
}
.hero-amount{
  font-size:38px;
  font-weight:700;
  letter-spacing:-0.02em;
  color:var(--green);
  line-height:1.1;
}
.hero-usd{
  font-size:13px;
  color:rgba(255,255,255,.4);
  margin-top:4px;
}
.hero-divider{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:1.25rem 0;
}
.hero-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.hstat-label{
  font-size:10px;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin-bottom:4px;
}
.hstat-val{
  font-size:16px;
  font-weight:600;
  color:var(--white);
}
.hstat-val.danger{color:#ff8080;}
.hstat-usd{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}

/* Breakdown card */
.breakdown-card{
  background:var(--white);
  border:1px solid var(--gray-200);
  border-radius:var(--radius-lg);
  overflow:hidden;
}
.breakdown-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.75rem 1rem;
  border-bottom:1px solid var(--gray-100);
}
.breakdown-title{font-size:12px;font-weight:700;color:var(--gray-600);letter-spacing:.04em;text-transform:uppercase;}

.bt-wrap{overflow-x:auto;}
table.bt{
  width:100%;border-collapse:collapse;
  font-size:12.5px;min-width:360px;
}
table.bt th{
  padding:8px 12px;
  text-align:left;
  font-size:10px;font-weight:700;
  color:var(--gray-400);
  letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid var(--gray-100);
  background:var(--off-white);
  white-space:nowrap;
}
table.bt th:not(:first-child){text-align:right;}
table.bt td{padding:9px 12px;color:var(--gray-900);vertical-align:middle;}
table.bt td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
table.bt tr{border-bottom:1px solid var(--gray-100);}
table.bt tr:last-child{border-bottom:none;}

/* Row types */
.r-section{background:var(--off-white);}
.r-section td{font-weight:700;font-size:13px;color:var(--navy);}
.r-sub td{color:var(--gray-600);}
.r-sub td:first-child{padding-left:22px;}
.r-net{background:var(--green-dim);}
.r-net td:first-child{font-weight:700;color:var(--green-dark);}

.tax-chip{
  display:inline-block;
  font-size:10px;padding:1px 6px;
  border-radius:4px;
  background:rgba(10,22,40,.08);
  color:var(--navy);
  margin-left:5px;vertical-align:middle;
  font-weight:700;letter-spacing:.03em;
}
.r-sub .tax-chip{background:rgba(10,22,40,.06);color:var(--navy-mid);}

.exch-note{
  font-size:11px;color:var(--gray-400);
  padding:9px 12px;
  border-top:1px solid var(--gray-100);
}

@media print{
  .topbar .sync-pill{display:none!important;}
  body{background:white;}
  .shell{padding:0 1rem;}
}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="logo-block">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="g" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#55aaff"/>
              <stop offset="100%" stop-color="#00C48C"/>
            </linearGradient>
          </defs>
          <rect x="2" y="9.5" width="20" height="5" rx="2.2" fill="url(#g)"/>
          <rect x="9.5" y="2" width="5" height="20" rx="2.2" fill="url(#g)"/>
        </svg>
      </div>
      <span class="brand-name">d<span>More</span></span>
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Tax Calculator</span>
    <button class="sync-pill" id="syncBtn">
      <div class="sync-dot spin-dot" id="syncDot"></div>
      <svg id="syncIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
        <path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <span id="syncStatus">Syncing...</span>
    </button>
  </div>

  <div class="err-banner" id="errBanner"></div>

  <div class="layout">

    <div class="panel-inputs">
      <div class="panel-section">
        <div class="section-label">1 · Country</div>
        <div class="select-wrap">
          <button class="country-btn" tabindex="-1" aria-hidden="true">
            <div>
              <div id="countryName">Select a country</div>
              <div class="country-meta" id="countryMeta">—</div>
            </div>
            <svg class="country-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <select id="countrySelect" aria-label="Country"></select>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">2 · Amount type</div>
        <div class="mode-tabs">
          <button class="tab active" id="tabExcl" onclick="setMode('excl')">Price before taxes</button>
          <button class="tab" id="tabIncl" onclick="setMode('incl')">Price with taxes</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label" id="amountSectionLabel">3 · Price before taxes</div>
        <div class="amount-wrap">
          <span class="amount-currency" id="amountCurrency">USD</span>
          <input class="amount-input" type="number" id="amountInput" value="200" min="0" step="1" inputmode="decimal"/>
        </div>
      </div>

      <div class="panel-section">
        <div class="section-label">4 · Fees</div>
        <div class="fee-row">
          <span class="fee-label">dLocal PSP Fee</span>
          <div class="fee-input-wrap">
            <input class="fee-input" type="number" id="pspFee" value="2" min="0" max="100" step="0.01"/>
            <span class="fee-pct">%</span>
          </div>
        </div>
        <div class="fee-row">
          <span class="fee-label">MoR Fee</span>
          <div class="fee-input-wrap">
            <input class="fee-input" type="number" id="morFee" value="3" min="0" max="100" step="0.01"/>
            <span class="fee-pct">%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-results">
      <div class="hero-card">
        <div class="hero-label">Merchant net take</div>
        <div class="hero-amount" id="heroNet">—</div>
        <div class="hero-usd" id="heroNetUSD"></div>
        <div class="hero-divider"></div>
        <div class="hero-stats">
          <div>
            <div class="hstat-label">Price w/ taxes</div>
            <div class="hstat-val" id="hTPV">—</div>
            <div class="hstat-usd" id="hTPVusd"></div>
          </div>
          <div>
            <div class="hstat-label">Invoice base</div>
            <div class="hstat-val" id="hInvoice">—</div>
            <div class="hstat-usd" id="hInvoiceUsd"></div>
          </div>
          <div>
            <div class="hstat-label">Total taxes</div>
            <div class="hstat-val danger" id="hTax">—</div>
            <div class="hstat-usd" id="hTaxUsd"></div>
          </div>
        </div>
      </div>

      <div class="breakdown-card">
        <div class="breakdown-head">
          <span class="breakdown-title">Full breakdown</span>
          <span class="exch-note" style="padding:0;border:none;" id="exchNote"></span>
        </div>
        <div class="bt-wrap">
          <table class="bt">
            <thead>
              <tr>
                <th style="width:40%">Item</th>
                <th>Rate</th>
                <th>Local (<span id="currHead">—</span>)</th>
                <th>USD</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--gray-400)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
const SHEET_ID  = '1o1b5CowxQNHwcuy7x1q1QFSSNhXnNzDeIfCCXOH0RhY';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv';

const FALLBACK = [
  {country_name:'Thailand',    country_code:'TH',currency:'THB',type:'VAT',description:'VAT Digital Services',percentage:7,  exchange_rate:32.3525},
  {country_name:'Philippines', country_code:'PH',currency:'PHP',type:'VAT',description:'VAT Digital Services',percentage:12, exchange_rate:60.637},
  {country_name:'Colombia',    country_code:'CO',currency:'COP',type:'VAT',description:'VAT Digital Services',percentage:19, exchange_rate:3556.136},
  {country_name:'Malaysia',    country_code:'MY',currency:'MYR',type:'VAT',description:'Direct Service Tax',  percentage:8,  exchange_rate:3.965},
  {country_name:'Indonesia',   country_code:'ID',currency:'IDR',type:'VAT',description:'VAT Digital Services',percentage:12, exchange_rate:17231},
  {country_name:'India',       country_code:'IN',currency:'INR',type:'VAT',description:'GST',                  percentage:18, exchange_rate:94.1526},
  {country_name:'Mexico',      country_code:'MX',currency:'MXN',type:'VAT',description:'VAT Digital Services',percentage:16, exchange_rate:17.40969},
];

let taxData = [];
let mode    = 'excl';

function fmt(n,d=2){return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtPct(n){return n.toFixed(2)+'%';}
function parseNum(s){return parseFloat(String(s).replace('%','').replace(',','.').trim());}

function splitLine(line){
  const cols=[];let cur='',inQ=false;
  for(const c of line){
    if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=c;
  }
  cols.push(cur.trim());
  return cols.map(s=>s.replace(/^"|"$/g,'').trim());
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  let hi=-1;
  for(let i=0;i<Math.min(lines.length,10);i++){
    const l=lines[i].toLowerCase();
    if(l.includes('country')&&l.includes('percentage')){hi=i;break;}
  }
  if(hi===-1)return null;
  const headers=splitLine(lines[hi]).map(h=>h.toLowerCase().replace(/[\s\-\/]+/g,'_'));
  const res=[];
  for(let i=hi+1;i<lines.length;i++){
    const row=splitLine(lines[i]);
    if(!row[0])continue;
    const obj={};
    headers.forEach((h,idx)=>{obj[h]=row[idx]||'';});
    const pct=parseNum(obj.percentage);
    const exr=parseNum(obj.exchange_rate||obj.exchangerate||obj.exchange||'0');
    if(isNaN(pct)||!obj.country_code)continue;
    res.push({
      country_name: obj.country_name||'',
      country_code: obj.country_code.toUpperCase(),
      currency:     (obj.currency||'').toUpperCase(),
      type:         obj.type||'VAT',
      description:  obj.description||'VAT',
      percentage:   pct,
      exchange_rate:isNaN(exr)||exr===0?null:exr,
    });
  }
  return res.length>0?res:null;
}

async function syncSheet(auto=false){
  const btn =document.getElementById('syncBtn');
  const icon=document.getElementById('syncIcon');
  const dot =document.getElementById('syncDot');
  const stat=document.getElementById('syncStatus');
  const err =document.getElementById('errBanner');
  icon.classList.add('spin');
  btn.disabled=true;
  dot.className='sync-dot spin-dot';
  err.style.display='none';
  if(!auto)stat.textContent='Syncing…';
  try{
    const r=await fetch(SHEET_URL,{cache:'no-cache'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const parsed=parseCSV(await r.text());
    if(!parsed)throw new Error('Tax table error.');
    taxData=parsed;
    buildSelect();
    calculate();
    dot.className='sync-dot ok';
    stat.textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    dot.className='sync-dot err';
    if(taxData.length===0){taxData=[...FALLBACK];buildSelect();calculate();}
    stat.textContent='Local data';
    err.innerHTML='<strong>Sync failed:</strong> '+e.message;
    err.style.display='block';
  }finally{
    icon.classList.remove('spin');
    btn.disabled=false;
  }
}

function buildSelect(){
  const sel=document.getElementById('countrySelect');
  const prev=sel.value;
  sel.innerHTML='';
  taxData.forEach(t=>{
    const o=document.createElement('option');
    o.value=t.country_code;
    o.textContent=t.country_name+' ('+t.currency+')';
    sel.appendChild(o);
  });
  if(prev&&taxData.find(t=>t.country_code===prev))sel.value=prev;
  updateCountryDisplay();
}

function updateCountryDisplay(){
  const sel=document.getElementById('countrySelect');
  const code=sel.value;
  const c=taxData.find(t=>t.country_code===code);
  document.getElementById('countryName').textContent=c?c.country_name:'Select a country';
  document.getElementById('countryMeta').textContent=c?(c.currency+' · '+c.percentage+'% '+c.type):'—';
  document.getElementById('amountCurrency').textContent=c?c.currency:'USD';
}

function setMode(m){
  mode=m;
  document.getElementById('tabExcl').classList.toggle('active',m==='excl');
  document.getElementById('tabIncl').classList.toggle('active',m==='incl');
  const lbl=m==='excl'?'3 · Price before taxes':'3 · Price with taxes included';
  document.getElementById('amountSectionLabel').textContent=lbl;
  calculate();
}

function calculate(){
  if(!taxData.length)return;
  const code=document.getElementById('countrySelect').value;
  const c=taxData.find(t=>t.country_code===code);
  if(!c)return;

  const amount=parseFloat(document.getElementById('amountInput').value)||0;
  const pspP =parseFloat(document.getElementById('pspFee').value)/100||0;
  const morP =parseFloat(document.getElementById('morFee').value)/100||0;
  const vatP =c.percentage/100;
  const exR  =c.exchange_rate||1;

  let TPV,invoice,grossTake,vatAmt,pspAmt,morAmt,netTake;
  if(mode==='excl'){
    grossTake=amount; invoice=grossTake;
    vatAmt=invoice*vatP; TPV=invoice*(1+vatP);
    pspAmt=TPV*pspP; morAmt=TPV*morP;
    netTake=grossTake-pspAmt-morAmt;
  }else{
    TPV=amount; vatAmt=TPV/(1+vatP)*vatP;
    invoice=TPV-vatAmt; grossTake=invoice;
    pspAmt=TPV*pspP; morAmt=TPV*morP;
    netTake=grossTake-pspAmt-morAmt;
  }

  const usd=v=>v/exR;
  const cur=c.currency;

  document.getElementById('heroNet').textContent   =cur+' '+fmt(netTake);
  document.getElementById('heroNetUSD').textContent='≈ USD '+fmt(usd(netTake));
  document.getElementById('hTPV').textContent      =cur+' '+fmt(TPV);
  document.getElementById('hTPVusd').textContent   ='≈ USD '+fmt(usd(TPV));
  document.getElementById('hInvoice').textContent  =cur+' '+fmt(invoice);
  document.getElementById('hInvoiceUsd').textContent='≈ USD '+fmt(usd(invoice));
  document.getElementById('hTax').textContent      =cur+' '+fmt(vatAmt);
  document.getElementById('hTaxUsd').textContent   ='≈ USD '+fmt(usd(vatAmt));
  document.getElementById('currHead').textContent  =cur;
  document.getElementById('exchNote').textContent  ='1 USD = '+fmt(exR,4)+' '+cur;

  const rows=mode==='excl'?[
    {l:'Price before taxes',         p:'',               v:grossTake, cls:'r-section'},
    {l:'Invoice / taxable base',     p:'',               v:invoice,   cls:'r-section'},
    {l:c.description,                p:fmtPct(c.percentage),v:vatAmt, cls:'r-sub vat'},
    {l:'Price with taxes included',  p:'',               v:TPV,       cls:'r-section'},
    {l:'dLocal PSP Fee',             p:fmtPct(pspP*100), v:pspAmt,    cls:'r-sub'},
    {l:'MoR Fee',                    p:fmtPct(morP*100), v:morAmt,    cls:'r-sub'},
    {l:'Merchant net take',          p:'',               v:netTake,   cls:'r-net'},
  ]:[
    {l:'Price with taxes included',  p:'',               v:TPV,       cls:'r-section'},
    {l:c.description,                p:fmtPct(c.percentage),v:vatAmt, cls:'r-sub vat'},
    {l:'Invoice / taxable base',     p:'',               v:invoice,   cls:'r-section'},
    {l:'Price before taxes',         p:'',               v:grossTake, cls:'r-section'},
    {l:'dLocal PSP Fee',             p:fmtPct(pspP*100), v:pspAmt,    cls:'r-sub'},
    {l:'MoR Fee',                    p:fmtPct(morP*100), v:morAmt,    cls:'r-sub'},
    {l:'Merchant net take',          p:'',               v:netTake,   cls:'r-net'},
  ];

  document.getElementById('tbody').innerHTML=rows.map(r=>{
    const isVat=r.cls.includes('vat');
    const lbl=r.l+(isVat?'<span class="tax-chip">'+c.type+'</span>':'');
    return `<tr class="${r.cls}">
      <td>${lbl}</td>
      <td>${r.p||'—'}</td>
      <td>${cur+' '+fmt(r.v)}</td>
      <td style="color:var(--gray-400)">USD ${fmt(usd(r.v))}</td>
    </tr>`;
  }).join('');
}

document.getElementById('syncBtn').addEventListener('click',()=>syncSheet(false));
document.getElementById('countrySelect').addEventListener('change',()=>{updateCountryDisplay();calculate();});
document.getElementById('amountInput').addEventListener('input',calculate);
document.getElementById('pspFee').addEventListener('input',calculate);
document.getElementById('morFee').addEventListener('input',calculate);

syncSheet(true);
</script>
</body>
</html>
